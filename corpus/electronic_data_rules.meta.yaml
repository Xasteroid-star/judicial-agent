notes: |
  本规定是中国首个系统性规范电子数据证据全流程的司法解释。核心贡献：
  (1) 首次在法律层面定义电子数据的四种类别；
  (2) 建立了「扣押封存原盘优先→提取数据备选→打印拍照兜底」的三级取证体系；
  (3) 引入完整性校验值等技术性保护措施；
  (4) 确立电子数据的「三性」审查标准（第22-28条）；
  (5) 区分程序瑕疵可补正（第27条）与绝对排除（第28条）。
  与2012年刑诉法第48条「电子数据」入法相配套。
