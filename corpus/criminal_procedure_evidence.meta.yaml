notes: |
  本章是刑事诉讼证据制度的基石。第55条确立了「排除合理怀疑」的证明标准，
  取代了原有的「证据确实充分」单一标准。第54-59条构建了中国特色的
  非法证据排除规则体系，区分了言词证据的绝对排除与实物证据的相对排除。
