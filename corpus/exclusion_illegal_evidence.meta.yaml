notes: |
  本规定是2012年刑诉法确立非法证据排除规则以来最系统的司法解释，
  共42条，覆盖侦查、审查逮捕、审查起诉、辩护、审判、二审、死刑复核
  全流程。核心亮点：(1)第5条重复性供述排除规则；(2)第34条「不能排除
  存在非法取证即排除」的证明标准；(3)第14条驻所检察侦查终结前核查制度。
